<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur supports-[backdrop-filter]:bg-white/75">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">

    <!-- Left -->
    <div class="flex min-w-0 items-center gap-3">
      <!-- Mobile menu button -->
      <button
        type="button"
        onclick="openSidebar()"
        aria-label="Open sidebar"
        aria-controls="sidebar"
        aria-expanded="false"
        class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-700 shadow-sm transition hover:border-slate-300 hover:text-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 lg:hidden"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h16" />
        </svg>
      </button>

      <div class="min-w-0">
        <h2 class="truncate text-base font-semibold text-slate-900 sm:text-lg">
          Task Manager
        </h2>
        <p class="hidden truncate text-sm text-slate-500 sm:block">
          Build and ship work faster with your team.
        </p>
      </div>
    </div>

    <!-- Right -->
    <div class="flex items-center gap-2 sm:gap-3">

      <!-- Search -->
      <form method="get" action="{% url 'task_list' %}" class="hidden md:block">
        <label for="header-search" class="sr-only">Search tasks</label>
        <div class="relative">
          <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 100-15 7.5 7.5 0 000 15z" />
            </svg>
          </span>
          <input
            id="header-search"
            type="text"
            name="q"
            placeholder="Search tasks..."
            class="w-64 rounded-2xl border border-slate-300 bg-white pl-10 pr-4 py-2.5 text-sm text-slate-700 placeholder:text-slate-400 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100"
          >
        </div>
      </form>

      <!-- CTA -->
      
    </div>
  </div>
</header>
