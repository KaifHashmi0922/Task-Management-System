{% if messages %}
  <div class="space-y-3 mb-6">
    {% for message in messages %}
      <div class="flex items-start gap-3 rounded-xl px-4 py-3 text-sm border shadow-sm relative
        {% if message.tags == 'success' %}bg-green-50 text-green-700 border-green-200{% endif %}
        {% if message.tags == 'error' %}bg-red-50 text-red-700 border-red-200{% endif %}
        {% if message.tags == 'info' %}bg-blue-50 text-blue-700 border-blue-200{% endif %}">

        <!-- Dot indicator -->
        <div class="mt-1 h-2 w-2 rounded-full
          {% if message.tags == 'success' %}bg-green-500{% endif %}
          {% if message.tags == 'error' %}bg-red-500{% endif %}
          {% if message.tags == 'info' %}bg-blue-500{% endif %}">
        </div>

        <div class="flex-1">
          {{ message }}
        </div>

        <!-- Close -->
        <button onclick="this.parentElement.remove()" 
                class="text-slate-400 hover:text-slate-700 absolute right-2 top-2">
          ✕
        </button>
      </div>
    {% endfor %}
  </div>
{% endif %}
