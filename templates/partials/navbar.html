<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">

    <!-- Left -->
    <div class="flex items-center gap-3">
      <!-- Mobile menu button -->
      <button type="button" onclick="openSidebar()" class="lg:hidden inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white text-slate-700 shadow-sm transition hover:border-slate-300 hover:text-indigo-600">
        <span class="text-lg">☰</span>
      </button>

      <div>
        <h2 class="text-lg font-semibold">Task Manager</h2>
        <p class="hidden sm:block text-sm text-slate-500">Build and ship work faster with your team.</p>
      </div>
    </div>

    <!-- Right -->
    <div class="flex items-center gap-3">

      <!-- Search -->
      <form method="get" action="{% url 'task_list' %}" class="hidden md:block">
        <input type="text" name="q" placeholder="Search..."
          class="w-64 rounded-xl border border-slate-300 px-4 py-2 text-sm 
                 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition">
      </form>

      <!-- CTA -->
      <a href="{% url 'task_create' %}"
         class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-medium text-white 
                hover:bg-indigo-700 transition shadow-sm">
        + Task
      </a>

    </div>
  </div>
</header>
